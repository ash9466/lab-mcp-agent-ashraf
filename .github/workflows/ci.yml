name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

  kubernetes:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Start Minikube
        uses: medyagh/setup-minikube@latest

      - name: Build Docker image inside Minikube
        run: |
          eval $(minikube -p minikube docker-env)
          chmod +x ./gradlew
          ./gradlew bootJar -x test
          docker build -t ai-agent:ci .

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f src/main/k8s/ai-agent-deployment.yml
          kubectl rollout status deployment/ai-agent --timeout=180s

      - name: Verify health endpoint
        run: |
          kubectl wait --for=condition=available deployment/ai-agent --timeout=180s
          kubectl port-forward svc/ai-agent 8080:8080 &
          sleep 10
          curl -f http://localhost:8080/actuator/health


